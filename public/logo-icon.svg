<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Brand Premium Gradients -->
    <linearGradient id="gradBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#2563eb" />
    </linearGradient>
    <linearGradient id="gradPurple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
    <linearGradient id="gradCyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2dd4bf" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>
    <linearGradient id="gradGlow" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0.1" />
    </linearGradient>
    <filter id="premiumGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="20" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Base Glow Shadow -->
  <circle cx="256" cy="256" r="180" fill="url(#gradGlow)" filter="url(#premiumGlow)" opacity="0.4" />

  <!-- Smooth Rounded Interlocking Waves forming 'S' for Sugora -->
  <g transform="translate(0, 0)">
    <!-- Cyan Loop (Bottom Left Flow) -->
    <path d="M 170,300 C 130,220 180,140 256,140 C 320,140 370,180 370,230 C 370,300 300,320 256,360 C 200,410 180,420 170,420 C 130,420 120,380 170,300 Z" 
          fill="url(#gradCyan)" opacity="0.95" />

    <!-- Blue Wave (Top Right Flow) -->
    <path d="M 342,212 C 382,292 332,372 256,372 C 192,372 142,332 142,282 C 142,212 212,192 256,152 C 312,102 332,92 342,92 C 382,92 392,132 342,212 Z" 
          fill="url(#gradBlue)" opacity="0.95" />

    <!-- Purple Interlaced Core Connector -->
    <path d="M 210,210 C 240,170 272,170 302,210 C 332,250 332,270 302,310 C 272,350 240,350 210,310 C 180,270 180,250 210,210 Z" 
          fill="url(#gradPurple)" />

    <!-- Pure Core White Light Sparkle -->
    <circle cx="256" cy="256" r="24" fill="#ffffff" filter="url(#premiumGlow)" />
    <circle cx="256" cy="256" r="12" fill="#3b82f6" />
  </g>
</svg>
